apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: monitoring-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingress
  servers:
  - hosts:
    - "*.jacky3.com"
    - "jacky3.com"
    port:
      name: http
      number: 80
      protocol: HTTP
    tls:
      httpsRedirect: true
  - hosts:
    - "*.jacky3.com"
    - "jacky3.com"
    port:
      name: https
      number: 443
      protocol: HTTPS
    tls:
      credentialName: monitoring-certs
      mode: SIMPLE
