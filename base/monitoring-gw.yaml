apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: monitoring-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: monitoring-gw
  namespace: istio-system
spec:
  hosts:
    - "*"
  gateways:
    - monitoring-gateway
  http:
    - match:
        - uri:
            prefix: "/productpage"
        - uri:
            prefix: "/static"
        - uri:
            prefix: "/login"
        - uri:
            prefix: "/logout"
        - uri:
            prefix: "/api/v1/products"
      route:
        - destination:
            host: productpage
            port:
              number: 9080